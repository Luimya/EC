<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; font-family: 'Space Grotesk', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
.row { display: flex; gap: 16px; flex-wrap: wrap; }
.card { width: 120px; height: 80px; border-radius: 2px; background: #111; border: 1px solid #2A2A2A; display: flex; align-items: center; justify-content: center; }
.label { font-size: 9px; color: #525252; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; margin-top: 6px; }
.item { display: flex; flex-direction: column; align-items: center; }
.section { font-size: 10px; color: #6B7280; letter-spacing: 0.14em; text-transform: uppercase; }
</style>
</head><body>
<div class="section">Glow System</div>
<div class="row">
  <div class="item">
    <div class="card" style="box-shadow:0 0 20px rgba(124,58,237,0.3),0 0 40px rgba(124,58,237,0.1)">
      <span style="font-size:10px;color:#A78BFA">violet</span>
    </div>
    <div class="label">glow-violet</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 0 20px rgba(240,24,92,0.35),0 0 40px rgba(240,24,92,0.1)">
      <span style="font-size:10px;color:#F0185C">pink</span>
    </div>
    <div class="label">glow-pink</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 0 20px rgba(0,229,204,0.3),0 0 40px rgba(0,229,204,0.1)">
      <span style="font-size:10px;color:#00E5CC">cyan</span>
    </div>
    <div class="label">glow-cyan</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 0 24px rgba(124,58,237,0.15)">
      <span style="font-size:10px;color:#6B7280">card</span>
    </div>
    <div class="label">glow-card</div>
  </div>
  <div class="item">
    <div class="card" style="box-shadow:0 0 0 2px rgba(124,58,237,0.5);border-color:#7C3AED">
      <span style="font-size:10px;color:#A78BFA">focus</span>
    </div>
    <div class="label">glow-focus</div>
  </div>
</div>
</body></html>
