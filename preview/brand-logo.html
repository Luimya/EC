<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;200&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; display: flex; align-items: center; justify-content: center; height: 150px; }
.logo-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.logo-kanji { font-family: 'Noto Sans JP', sans-serif; font-weight: 100; font-size: 64px; color: #F0F0F0; letter-spacing: -2px; line-height: 1; }
.logo-sub { font-family: 'Space Grotesk', sans-serif; font-weight: 500; font-size: 11px; color: #6B7280; letter-spacing: 10px; text-transform: uppercase; padding-left: 3px; }
</style>
</head><body>
<div class="logo-wrap">
  <div class="logo-kanji">闇市</div>
  <div class="logo-sub">YAMIICHI</div>
</div>
</body></html>
