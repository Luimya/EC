<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&family=Space+Grotesk:wght@500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; font-family: 'Space Grotesk', sans-serif; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.section { font-size: 10px; color: #6B7280; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }
.badge { display: inline-flex; align-items: center; font-family: 'Space Grotesk', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; border-radius: 999px; padding: 3px 10px; }
.badge-new { background: rgba(0,229,204,0.12); color: #00E5CC; border: 1px solid rgba(0,229,204,0.25); }
.badge-limited { background: rgba(240,24,92,0.12); color: #F0185C; border: 1px solid rgba(240,24,92,0.25); }
.badge-sold { background: rgba(107,114,128,0.15); color: #6B7280; border: 1px solid #2A2A2A; }
.badge-collab { background: rgba(124,58,237,0.15); color: #A78BFA; border: 1px solid rgba(124,58,237,0.3); }
.badge-sale { background: #F0185C; color: #F0F0F0; border: none; }
.badge-stock { background: rgba(34,197,94,0.12); color: #22C55E; border: 1px solid rgba(34,197,94,0.25); }
.tag { display: inline-flex; align-items: center; font-size: 11px; color: #9CA3AF; border: 1px solid #2A2A2A; border-radius: 2px; padding: 4px 10px; font-weight: 400; }
.tag:hover { border-color: #7C3AED; color: #A78BFA; }
.divider { height: 1px; background: #1A1A1A; }
</style>
</head><body>
<div class="section">Status Badges</div>
<div class="row">
  <span class="badge badge-new">NEW</span>
  <span class="badge badge-limited">限定</span>
  <span class="badge badge-collab">COLLAB</span>
  <span class="badge badge-sale">SALE</span>
  <span class="badge badge-sold">SOLD OUT</span>
  <span class="badge badge-stock">在庫あり</span>
</div>
<div class="divider"></div>
<div class="section">Category Tags</div>
<div class="row">
  <span class="tag">アパレル</span>
  <span class="tag">ジュエリー</span>
  <span class="tag">アイドル</span>
  <span class="tag">アニメ</span>
  <span class="tag">フィギュア</span>
  <span class="tag">写真集</span>
</div>
</body></html>
