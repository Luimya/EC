<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
.row { display: flex; gap: 6px; margin-bottom: 16px; }
.swatch { flex: 1; height: 36px; border-radius: 2px; position: relative; }
.scale-label { font-size: 9px; color: #6B7280; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.hex-row { display: flex; gap: 6px; margin-bottom: 4px; }
.hex-label { font-size: 9px; color: #525252; text-align: center; flex: 1; }
.group { margin-bottom: 12px; }
.group-name { font-size: 10px; color: #6B7280; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 8px; }
.accent-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
.big-dot { width: 48px; height: 48px; border-radius: 2px; flex-shrink: 0; }
.info .name { font-size: 11px; font-weight: 600; color: #9CA3AF; letter-spacing: 0.1em; text-transform: uppercase; }
.info .hex { font-size: 13px; color: #F0F0F0; }
.info .role { font-size: 11px; color: #6B7280; }
</style>
</head><body>
<div class="group">
  <div class="group-name">Violet — Primary Accent</div>
  <div class="row">
    <div class="swatch" style="background:#1E0A45"></div>
    <div class="swatch" style="background:#2D1B69"></div>
    <div class="swatch" style="background:#4C1D95"></div>
    <div class="swatch" style="background:#5B21B6"></div>
    <div class="swatch" style="background:#7C3AED;box-shadow:0 0 12px rgba(124,58,237,0.5)"></div>
    <div class="swatch" style="background:#8B5CF6"></div>
    <div class="swatch" style="background:#A78BFA"></div>
    <div class="swatch" style="background:#C4B5FD"></div>
  </div>
  <div class="hex-row">
    <span class="hex-label">900</span><span class="hex-label">800</span><span class="hex-label">700</span><span class="hex-label">600</span><span class="hex-label" style="color:#A78BFA">500★</span><span class="hex-label">400</span><span class="hex-label">300</span><span class="hex-label">200</span>
  </div>
</div>
<div class="group">
  <div class="group-name">Neon Pink — CTA</div>
  <div class="row">
    <div class="swatch" style="background:#9D0A3C"></div>
    <div class="swatch" style="background:#E3114F"></div>
    <div class="swatch" style="background:#F0185C;box-shadow:0 0 12px rgba(240,24,92,0.5)"></div>
    <div class="swatch" style="background:#F4437A"></div>
    <div class="swatch" style="background:#F87BAA"></div>
    <div class="swatch" style="background:#FECDD3"></div>
  </div>
  <div class="hex-row">
    <span class="hex-label">600</span><span class="hex-label">500</span><span class="hex-label" style="color:#F0185C">400★</span><span class="hex-label">300</span><span class="hex-label">200</span><span class="hex-label">100</span>
  </div>
</div>
<div class="group">
  <div class="group-name">Cyan — Secondary Accent</div>
  <div class="row">
    <div class="swatch" style="background:#00B8A3; max-width:80px"></div>
    <div class="swatch" style="background:#00E5CC;box-shadow:0 0 12px rgba(0,229,204,0.4); max-width:80px"></div>
    <div class="swatch" style="background:#34EDD8; max-width:80px"></div>
    <div class="swatch" style="background:#67F2E4; max-width:80px"></div>
  </div>
  <div class="hex-row" style="max-width:332px">
    <span class="hex-label">500</span><span class="hex-label" style="color:#00E5CC">400★</span><span class="hex-label">300</span><span class="hex-label">200</span>
  </div>
</div>
</body></html>
