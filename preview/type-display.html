<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100;200;300;400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #080808; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
.specimen { display: flex; flex-direction: column; gap: 2px; padding-bottom: 16px; border-bottom: 1px solid #1A1A1A; }
.specimen:last-child { border-bottom: none; padding-bottom: 0; }
.meta { font-family: 'Space Grotesk', sans-serif; font-size: 10px; color: #525252; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
</style>
</head><body>
<div class="specimen">
  <div class="meta">h1 — Noto Sans JP / 72px / weight 100</div>
  <div style="font-family:'Noto Sans JP',sans-serif;font-weight:100;font-size:48px;line-height:1.1;color:#F0F0F0;letter-spacing:-0.02em">闇に潜む美しさ</div>
</div>
<div class="specimen">
  <div class="meta">h2 — Noto Sans JP / 48px / weight 200</div>
  <div style="font-family:'Noto Sans JP',sans-serif;font-weight:200;font-size:32px;line-height:1.2;color:#F0F0F0;letter-spacing:-0.02em">新作コレクション</div>
</div>
<div class="specimen">
  <div class="meta">h3 — Noto Sans JP / 32px / weight 300</div>
  <div style="font-family:'Noto Sans JP',sans-serif;font-weight:300;font-size:24px;line-height:1.35;color:#F0F0F0">アイドルグッズ・アパレル</div>
</div>
<div class="specimen">
  <div class="meta">Display Latin — Space Grotesk / 48px / weight 700</div>
  <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:36px;line-height:1.1;color:#F0F0F0;letter-spacing:-0.03em">YAMIICHI</div>
</div>
</body></html>
